<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>3S SOUND</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="3S_logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF0000">
    <style>
        @font-face {
            font-family: '3S-Special';
            src: url('myFont.otf') format('opentype');
            font-weight: normal; font-style: normal;
        }
        * { box-sizing: border-box; }
        :root { 
            --theme: #FF0000; 
            --bg: #000000; --card: #1c1c1e; --text: #ffffff; --sub: #98989d; --border: #333333;
        }
        body { 
            margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent; display: flex; justify-content: center; height: 100vh; overflow: hidden;
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('note_bg.jpg');
            background-size: cover; background-position: center;
        }
        #app { width: 100%; max-width: 440px; background: rgba(0, 0, 0, 0.6); position: relative; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .header { padding: 40px 24px 20px; display: flex; justify-content: space-between; align-items: center; height: 90px; }
        .page-header { padding: 40px 24px 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; height: 90px; }
        h1 { font-family: '3S-Special', sans-serif; font-size: 26px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        h1 span { color: #FF0000; }
        .page { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; overflow-y: auto; padding-bottom: 20px; background: rgba(0,0,0,0.9); }
        .page.active { display: block; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 10px 24px; }
        .box { background: rgba(28, 28, 30, 0.8); border-radius: 28px; padding: 24px; aspect-ratio: 1 / 0.95; display: flex; flex-direction: column; justify-content: space-between; border: 2px solid transparent; cursor: pointer; transition: 0.2s; position: relative; }
        .box.active { border-color: var(--theme); }
        .box.locked { opacity: 0.8; cursor: wait; pointer-events: none; }
        .box-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .device-icon { width: 60px; height: 60px; object-fit: contain; }
        .toggle-switch { position: relative; width: 50px; height: 30px; background: #3a3a3c; border-radius: 15px; transition: 0.3s; }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px; background: white; border-radius: 50%; transition: 0.3s; }
        .box.active .toggle-switch { background: var(--theme); }
        .box.active .toggle-switch::after { transform: translateX(20px); }
        
        .bt-status-label { font-size: 8px; color: var(--sub); text-align: right; line-height: 1.2; font-weight: 600; margin-top: 2px; }
        .box.active .bt-status-label { color: var(--theme); }
        .box-info div:last-child { font-size: 8px; opacity: 0.6; margin-top: 2px; }
        
        .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid var(--theme); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .box.locked .spinner { display: block; }
        .box.locked .toggle-switch { display: none; }

        .settings-group { margin: 20px 24px; }
        .group-label { color: var(--sub); font-size: 10px; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; }
        .settings-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 12px; }
        .settings-row { display: flex; padding: 14px 18px; border-bottom: 1px solid var(--border); justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.03); }
        .val-grid { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border); background: rgba(0, 0, 0, 0.1); }
        .val-cell { padding: 12px 18px; border-right: 1px solid var(--border); }
        input { background: none; border: none; color: var(--text); font-size: 16px; width: 100%; text-align: right; outline: none; }
        .color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.selected { border-color: var(--text); transform: scale(1.1); }
        .icon-btn { width: 40px; height: 40px; border: none; background: transparent; display: flex; align-items: center; justify-content: center; }
        .icon-btn img { width: 30px; height: 30px; }
        .action-btn { width: 100%; background: var(--theme); color: white; border: none; border-radius: 12px; height: 50px; font-weight: 700; font-size: 16px; cursor: pointer; }
        
        #statusText { 
            font-size: 14px; 
            margin-top: 40px; 
            color: #8e8e93; 
            -webkit-text-stroke: 0.1px white; 
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="dashboard" class="page active">
            <div class="header">
                <div class="icon-btn" onclick="openPage('settings')"><img src="settings_icon.png"></div>
                <h1><span>3S</span> SOUND</h1>
                <div class="icon-btn" onclick="openPage('connStatus')"><img id="wifiHeaderIcon" src="con_icon.png"></div>
            </div>
            <div class="grid" id="mainGrid"></div>
        </div>

        <div id="settings" class="page">
            <div class="page-header">
                <span style="color:var(--theme); cursor:pointer;" onclick="render();openPage('dashboard')">‹ Geri</span>
                <span style="font-weight:700;">AYARLAR</span>
                <span></span>
            </div>
            <div id="settingsList" class="settings-group"></div>
            <div class="settings-group">
                <div class="group-label">GÖRÜNÜM</div>
                <div class="settings-card"><div class="settings-row"><span>Tema</span><div style="display:flex; gap:10px;" id="themePalette"></div></div></div>
            </div>
        </div>

        <div id="connStatus" class="page">
            <div class="page-header">
                <span style="color:var(--theme); cursor:pointer;" onclick="openPage('dashboard')">‹ Geri Dön</span>
                <span style="font-weight:700;">BAĞLANTI</span>
                <span></span>
            </div>
            <div style="padding:0 24px; text-align: center;">
                <div id="statusIconBig" style="margin-bottom: 20px;"><img src="con_icon.png" style="width:80px;"></div>
                <button class="action-btn" onclick="checkConnection()">BAĞLAN</button>
                <div id="statusText">Kontrol ediliyor...</div>
            </div>
        </div>
    </div>

    <script>
        const colors = ["#FF0000", "#007AFF", "#34C759", "#BF00FF", "#FFD600", "#E0E0E0"];
        const ESP_IP = "http://192.168.4.1";
        let isConnected = false, isWaiting = false, activeTargetId = null;

        let config = JSON.parse(localStorage.getItem('3s_config_v2')) || [
            {id:0, name:"Pandizot", on:"1", off:"2", state:false, icon:"speaker_icon.png"},
            {id:1, name:"LED", on:"3", off:"4", state:false, icon:"light_icon.png"},
            {id:2, name:"Sistem", on:"5", off:"6", state:false, icon:"system_icon.png"}
        ];

        async function checkConnection() {
            const st = document.getElementById('statusText');
            st.innerText = "Bağlanıyor...";
            try {
                const controller = new AbortController();
                setTimeout(() => controller.abort(), 2000);
                await fetch(`${ESP_IP}/status`, { signal: controller.signal, mode: 'no-cors' });
                isConnected = true;
                st.innerText = "Bağlı";
                st.style.color = "white";
                st.style.webkitTextStroke = "0.5px white";
            } catch (e) {
                isConnected = false;
                st.innerText = "Lütfen 3S Sound Control ağına bağlandığınızdan emin olun.";
                st.style.color = "#8e8e93"; 
                st.style.webkitTextStroke = "0.1px white"; 
            }
            render();
        }

        function render() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = config.map(s => {
                let isThisLocked = isWaiting && (s.id === activeTargetId || activeTargetId === 2);
                return `
                <div class="box ${s.state ? 'active' : ''} ${isThisLocked ? 'locked' : ''}" onclick="toggleSwitch(${s.id})">
                    <div class="box-top">
                        <img src="${s.icon}" class="device-icon">
                        <div class="toggle-switch"></div>
                        <div class="spinner"></div>
                    </div>
                    <div class="box-info">
                        <div style="font-size:14px; font-weight:700;">${s.name}</div>
                        <div>${s.state ? 'AÇIK' : 'KAPALI'}</div>
                    </div>
                </div>`;
            }).join('') + `
            <div class="box ${isConnected ? 'active' : ''}" onclick="openPage('connStatus')">
                <div class="box-top">
                    <img src="con_icon.png" class="device-icon">
                    <div class="bt-status-label">${isConnected ? 'BAĞLI' : 'BAĞLI<br>DEĞİL'}</div>
                </div>
                <div class="box-info">
                    <div style="font-size:14px; font-weight:700;">Bağlantı</div>
                    <div>${isConnected ? 'HAZIR' : 'KONTROL EDİN'}</div>
                </div>
            </div>`;

            const sList = document.getElementById('settingsList');
            sList.innerHTML = `<div class="group-label">FONKSİYON</div>` + config.map((s, i) => `
                <div class="settings-card">
                    <div class="settings-row"><span>Anahtar</span><input type="text" value="${s.name}" oninput="updateConfig(${i},'name',this.value)"></div>
                    <div class="val-grid">
                        <div class="val-cell"><div style="font-size:9px;color:var(--sub)">AÇIK</div><input type="text" value="${s.on}" oninput="updateConfig(${i},'on',this.value)"></div>
                        <div class="val-cell"><div style="font-size:9px;color:var(--sub)">KAPALI</div><input type="text" value="${s.off}" oninput="updateConfig(${i},'off',this.value)"></div>
                    </div>
                </div>`).join('');

            const cur = localStorage.getItem('theme') || '#FF0000';
            document.getElementById('themePalette').innerHTML = colors.map(c => `<div class="color-dot ${c === cur ? 'selected' : ''}" style="background:${c}" onclick="applyTheme('${c}')"></div>`).join('');
            document.getElementById('wifiHeaderIcon').style.filter = isConnected ? `drop-shadow(0 0 5px var(--theme))` : 'grayscale(1)';
        }

        function updateConfig(id, key, val) { config[id][key] = val; localStorage.setItem('3s_config_v2', JSON.stringify(config)); }
        function applyTheme(c) { localStorage.setItem('theme', c); document.documentElement.style.setProperty('--theme', c); render(); }

        function toggleSwitch(id) {
            if (isWaiting) return;
            activeTargetId = id; let lockDuration = 300;
            if (id === 2) {
                config[2].state = !config[2].state; config[0].state = config[2].state; config[1].state = config[2].state;
                lockDuration = 2000; isWaiting = true; render();
                if (config[2].state) {
                    setTimeout(() => fetch(`${ESP_IP}/komut?val=${config[0].on}`, {mode:'no-cors'}), 100);
                    setTimeout(() => fetch(`${ESP_IP}/komut?val=${config[1].on}`, {mode:'no-cors'}), 1700);
                } else {
                    setTimeout(() => fetch(`${ESP_IP}/komut?val=${config[0].off}`, {mode:'no-cors'}), 100);
                    setTimeout(() => fetch(`${ESP_IP}/komut?val=${config[1].off}`, {mode:'no-cors'}), 1700);
                }
            } else {
                config[id].state = !config[id].state; if (id === 0) lockDuration = 2000;
                config[2].state = (config[0].state && config[1].state);
                isWaiting = true; fetch(`${ESP_IP}/komut?val=${config[id].state ? config[id].on : config[id].off}`, {mode:'no-cors'});
                render();
            }
            localStorage.setItem('3s_config_v2', JSON.stringify(config));
            setTimeout(() => { isWaiting = false; activeTargetId = null; render(); }, lockDuration);
        }

        function openPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        window.onload = () => { applyTheme(localStorage.getItem('theme') || '#FF0000'); checkConnection(); };
    </script>
</body>
</html>
