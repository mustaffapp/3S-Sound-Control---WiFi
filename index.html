<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>3S SOUND</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="3S_logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF0000">
    <style>
        @font-face { font-family: '3S-Special'; src: url('myFont.otf') format('opentype'); }
        * { box-sizing: border-box; }
        :root { --theme: #FF0000; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --sub: #98989d; --border: #333333; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; display: flex; justify-content: center; height: 100vh; overflow: hidden; background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('note_bg.jpg'); background-size: cover; background-position: center; }
        #app { width: 100%; max-width: 440px; background: rgba(0,0,0,0.6); position: relative; display: flex; flex-direction: column; height: 100%; }
        .header { padding: 40px 24px 20px; display: flex; justify-content: space-between; align-items: center; height: 90px; }
        .page-header { padding: 40px 24px 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; height: 90px; }
        h1 { font-family: '3S-Special', sans-serif; font-size: 26px; margin: 0; text-transform: uppercase; }
        h1 span { color: #FF0000; }
        .page { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; overflow-y: auto; background: rgba(0,0,0,0.9); padding-bottom: 20px; }
        .page.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 10px 24px; }
        .box { background: rgba(28,28,30,0.8); border-radius: 28px; padding: 24px; aspect-ratio: 1/0.95; display: flex; flex-direction: column; justify-content: space-between; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .box.active { border-color: var(--theme); }
        .box.locked { opacity: 0.8; cursor: wait; pointer-events: none; }
        .toggle-switch { width: 50px; height: 30px; background: #3a3a3c; border-radius: 15px; position: relative; transition: 0.3s; }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px; background: white; border-radius: 50%; transition: 0.3s; }
        .box.active .toggle-switch { background: var(--theme); }
        .box.active .toggle-switch::after { transform: translateX(20px); }
        .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid var(--theme); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .box.locked .spinner { display: block; }
        .box.locked .toggle-switch { display: none; }
        .color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.selected { border-color: white; transform: scale(1.1); }
        .action-btn { width: 100%; background: var(--theme); color: white; border: none; border-radius: 12px; height: 50px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div id="dashboard" class="page active">
            <div class="header">
                <div onclick="openPage('settings')"><img src="settings_icon.png" width="30"></div>
                <h1><span>3S</span> SOUND</h1>
                <div onclick="openPage('connStatus')"><img id="wifiHeaderIcon" src="con_icon.png" width="30" style="filter:grayscale(1)"></div>
            </div>
            <div class="grid" id="mainGrid"></div>
        </div>

        <div id="settings" class="page">
            <div class="page-header">
                <span style="color:var(--theme); cursor:pointer;" onclick="render();openPage('dashboard')">‹ Geri</span>
                <span style="font-weight:700;">AYARLAR</span>
                <span></span>
            </div>
            <div id="settingsList" style="padding: 24px;"></div>
            <div style="padding: 0 24px;">
                <div style="color:var(--sub); font-size:10px; margin-bottom:8px;">TEMA</div>
                <div id="themePalette" style="display:flex; gap:10px; background:var(--card); padding:15px; border-radius:16px;"></div>
            </div>
        </div>

        <div id="connStatus" class="page">
            <div class="page-header">
                <span onclick="openPage('dashboard')">‹ Geri</span>
                <span style="font-weight:700;">BAĞLANTI</span>
                <span></span>
            </div>
            <div style="padding:40px 24px; text-align:center;">
                <img src="con_icon.png" width="80" style="margin-bottom:20px;">
                <button class="action-btn" onclick="checkConnection()">BAĞLAN</button>
                <div id="statusText" style="margin-top:20px; font-size:14px; color:#8e8e93;">Kontrol ediliyor...</div>
            </div>
        </div>
    </div>

    <script>
        const colors = ["#FF0000", "#007AFF", "#34C759", "#BF00FF", "#FFD600", "#E0E0E0"];
        const ESP_IP = "http://192.168.4.1";
        let isConnected = false, isWaiting = false;

        let config = JSON.parse(localStorage.getItem('3s_config_v2')) || [
            {id:0, name:"Pandizot", on:"1", off:"2", state:false, icon:"speaker_icon.png"},
            {id:1, name:"LED", on:"3", off:"4", state:false, icon:"light_icon.png"},
            {id:2, name:"Sistem", on:"5", off:"6", state:false, icon:"system_icon.png"}
        ];

        async function checkConnection() {
            const st = document.getElementById('statusText');
            st.innerText = "Sorgulanıyor...";
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2500);
                const response = await fetch(`${ESP_IP}/status`, { signal: controller.signal });
                const data = await response.json();
                
                // ESP'den gelen gerçek durumları config'e işle
                config[0].state = data.lid;
                config[1].state = data.light;
                config[2].state = (data.lid && data.light);
                
                isConnected = true;
                st.innerText = "Bağlantı Başarılı";
            } catch (e) {
                isConnected = false;
                st.innerText = "3S Sound Control ağına bağlanın.";
            }
            render();
        }

        function render() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = config.map(s => `
                <div class="box ${s.state ? 'active' : ''} ${isWaiting ? 'locked' : ''}" onclick="toggleSwitch(${s.id})">
                    <div style="display:flex; justify-content:space-between;">
                        <img src="${s.icon}" width="60" height="60">
                        <div class="toggle-switch"></div>
                        <div class="spinner"></div>
                    </div>
                    <div>
                        <div style="font-size:14px; font-weight:700;">${s.name}</div>
                        <div style="font-size:10px; opacity:0.6;">${s.state ? 'AÇIK' : 'KAPALI'}</div>
                    </div>
                </div>`).join('') + `
                <div class="box ${isConnected ? 'active' : ''}" onclick="openPage('connStatus')">
                    <img src="con_icon.png" width="60">
                    <div style="font-size:14px; font-weight:700;">Bağlantı</div>
                </div>`;

            document.getElementById('wifiHeaderIcon').style.filter = isConnected ? `drop-shadow(0 0 5px var(--theme))` : 'grayscale(1)';
            
            const cur = localStorage.getItem('theme') || '#FF0000';
            document.getElementById('themePalette').innerHTML = colors.map(c => `<div class="color-dot ${c === cur ? 'selected' : ''}" style="background:${c}" onclick="applyTheme('${c}')"></div>`).join('');
        }

        async function toggleSwitch(id) {
            if (isWaiting) return;
            isWaiting = true;
            const target = config[id];
            const newState = !target.state;
            const cmd = newState ? target.on : target.off;
            
            render();
            try {
                await fetch(`${ESP_IP}/komut?val=${cmd}`);
                target.state = newState;
                if (id === 2) { config[0].state = newState; config[1].state = newState; }
                else { config[2].state = (config[0].state && config[1].state); }
            } catch (e) { console.log("Hata"); }
            
            setTimeout(() => { isWaiting = false; render(); }, id === 0 || id === 2 ? 1600 : 300);
        }

        function applyTheme(c) { localStorage.setItem('theme', c); document.documentElement.style.setProperty('--theme', c); render(); }
        function openPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        window.onload = () => { applyTheme(localStorage.getItem('theme') || '#FF0000'); checkConnection(); };
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
